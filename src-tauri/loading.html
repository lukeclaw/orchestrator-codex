<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Orchestrator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f10;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #7c6fe0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }
    p {
      font-size: 0.875rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Starting Claude Orchestrator</h1>
    <p id="status">Initializing server...</p>
  </div>
  <script>
    // Client-side fallback: poll the health endpoint and redirect when ready.
    // The Rust side also triggers the redirect, but this ensures it works even
    // if the eval() call arrives before the page is ready.
    const SERVER = 'http://127.0.0.1:8093';
    let attempts = 0;
    const maxAttempts = 150; // 30 seconds at 200ms intervals

    function checkServer() {
      attempts++;
      fetch(SERVER + '/api/health', { mode: 'no-cors' })
        .then(() => {
          // no-cors means we can't read the response, but a successful fetch
          // means the server is up. Try a real fetch to confirm.
          return fetch(SERVER + '/api/health');
        })
        .then(r => {
          if (r.ok) {
            window.location.replace(SERVER);
          } else {
            retry();
          }
        })
        .catch(() => {
          retry();
        });
    }

    function retry() {
      if (attempts >= maxAttempts) {
        document.getElementById('status').textContent =
          'Server failed to start. Check ~/Library/Application Support/ClaudeOrchestrator/orchestrator.log';
        return;
      }
      setTimeout(checkServer, 200);
    }

    // Start polling after a brief delay
    setTimeout(checkServer, 500);
  </script>
</body>
</html>
